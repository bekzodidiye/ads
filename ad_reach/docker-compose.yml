version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=ad_reach_user
      - POSTGRES_PASSWORD=ad_reach_password  # Oddiy va xavfsiz parol
      - POSTGRES_DB=ad_reach_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://ad_reach_user:ad_reach_password@db:5432/ad_reach_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=1
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    command: celery -A config worker -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://ad_reach_user:ad_reach_password@db:5432/ad_reach_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    command: celery -A config beat -l info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://ad_reach_user:ad_reach_password@db:5432/ad_reach_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - celery_worker

volumes:
  postgres_data: